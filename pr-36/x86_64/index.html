<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visual docs</title>
<style>body{font-family:system-ui,sans-serif;margin:2rem;color:#222}section.shot{margin-bottom:2.5rem}section.shot[hidden]{display:none}h2{margin-bottom:.5rem}.toggles{display:flex;flex-wrap:wrap;gap:1rem;margin:0 0 1.5rem;position:sticky;top:0;background:#fff;padding:.75rem 0;z-index:1}.toggle{display:flex;align-items:center;gap:.4rem}.dim-label{font-size:.8rem;color:#555}.toggle button{font:inherit;font-size:.8rem;padding:.15rem .6rem;border:1px solid #bbb;background:#f6f6f6;border-radius:999px;cursor:pointer}.toggle button.active{background:#222;color:#fff;border-color:#222}.variants img{max-width:100%;height:auto;border:1px solid #ddd;border-radius:4px}.variant[hidden]{display:none}</style>
</head>
<body>
<h1>Visual docs</h1>
<div class="toggles"><div class="toggle" data-dim="viewport"><span class="dim-label">Viewport</span><button type="button" data-val="desktop" class="active">desktop</button><button type="button" data-val="mobile">mobile</button></div></div>
<section class="shot"><h2>continued-session-reply-focus</h2>
<div class="variants"><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/dark/continued-session-reply-focus.png" alt="continued-session-reply-focus [theme=dark, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/dark/continued-session-reply-focus.png" alt="continued-session-reply-focus [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/light/continued-session-reply-focus.png" alt="continued-session-reply-focus [theme=light, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/light/continued-session-reply-focus.png" alt="continued-session-reply-focus [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>conversation-formatted-json</h2>
<div class="variants"><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/dark/conversation-formatted-json.png" alt="conversation-formatted-json [theme=dark, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/dark/conversation-formatted-json.png" alt="conversation-formatted-json [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/light/conversation-formatted-json.png" alt="conversation-formatted-json [theme=light, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/light/conversation-formatted-json.png" alt="conversation-formatted-json [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>conversation-list-label-dialog</h2>
<div class="variants"><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/dark/conversation-list-label-dialog.png" alt="conversation-list-label-dialog [theme=dark, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/dark/conversation-list-label-dialog.png" alt="conversation-list-label-dialog [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/light/conversation-list-label-dialog.png" alt="conversation-list-label-dialog [theme=light, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/light/conversation-list-label-dialog.png" alt="conversation-list-label-dialog [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>conversation-list-project-focus</h2>
<div class="variants"><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/dark/conversation-list-project-focus.png" alt="conversation-list-project-focus [theme=dark, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/dark/conversation-list-project-focus.png" alt="conversation-list-project-focus [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/light/conversation-list-project-focus.png" alt="conversation-list-project-focus [theme=light, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/light/conversation-list-project-focus.png" alt="conversation-list-project-focus [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>conversation-rich-markdown</h2>
<div class="variants"><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/dark/conversation-rich-markdown.png" alt="conversation-rich-markdown [theme=dark, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/dark/conversation-rich-markdown.png" alt="conversation-rich-markdown [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="viewport=desktop" loading="lazy" src="desktop/light/conversation-rich-markdown.png" alt="conversation-rich-markdown [theme=light, viewport=desktop]"><img class="variant" data-variant="viewport=mobile" loading="lazy" src="mobile/light/conversation-rich-markdown.png" alt="conversation-rich-markdown [theme=light, viewport=mobile]" hidden></div></section>
<script>const bar=document.querySelector('.toggles');if(bar){const sel={};for(const t of bar.querySelectorAll('.toggle')){const a=t.querySelector('button.active')||t.querySelector('button');if(a)sel[t.dataset.dim]=a.dataset.val;}const parse=s=>{const o={};if(s)for(const p of s.split(';')){const i=p.indexOf('=');o[p.slice(0,i)]=p.slice(i+1);}return o;};const match=v=>{for(const k in v)if(sel[k]!==v[k])return false;return true;};const apply=()=>{for(const sec of document.querySelectorAll('.shot')){const imgs=sec.querySelectorAll('.variant');if(!imgs.length)continue;let any=false;for(const img of imgs){const ok=match(parse(img.dataset.variant));img.hidden=!ok;if(ok)any=true;}sec.hidden=!any;}for(const b of bar.querySelectorAll('.toggle button'))b.classList.toggle('active',sel[b.parentElement.dataset.dim]===b.dataset.val);};for(const b of bar.querySelectorAll('.toggle button'))b.addEventListener('click',()=>{sel[b.parentElement.dataset.dim]=b.dataset.val;apply();});apply();}</script>
</body>
</html>
