[advisories]
# Tauri v2's supported Linux WebKit backend still requires gtk-rs GTK3. These
# advisories describe maintenance status, not a vulnerability, and have no safe
# upgrade. RUSTSEC-2024-0370 is pulled only through the same GTK macros.
ignore = [
  "RUSTSEC-2024-0370",
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  # Tauri's urlpattern dependency uses rust-unic. These are maintenance
  # notices with no safe upgrade; the app does not directly consume them.
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
]
yanked = "deny"

[bans]
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"

[licenses]
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "CC0-1.0",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = []
