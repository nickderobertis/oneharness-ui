name: version

on:
  push:
    branches: [main]

concurrency:
  group: version-main
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  version:
    name: version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Install pinned workspace
        run: just bootstrap
      - name: Establish the initial pre-1.0 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: just seed-release
      - name: Compute, tag, and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: just publish-release
      - name: Reconcile the latest native artifact run
        env:
          GH_TOKEN: ${{ github.token }}
        run: just dispatch-release
