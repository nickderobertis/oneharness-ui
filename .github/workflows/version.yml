name: version

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  version:
    name: version
    runs-on: ubuntu-22.04
    steps:
      - name: Require release token
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "${RELEASE_TOKEN:-}" ]; then
            echo "::error::Add RELEASE_TOKEN so release tags trigger artifact workflows." >&2
            exit 1
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Materialize pinned SDK and install workspace
        run: just bootstrap
      - name: Compute, commit, tag, and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: just publish-release
