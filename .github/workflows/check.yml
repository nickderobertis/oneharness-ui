name: check

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  check:
    name: check (${{ matrix.os }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install Tauri prerequisites
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap clean checkout
        run: just bootstrap
      - name: Shared gate from explicit merge base
        shell: bash
        run: |
          git fetch --no-tags origin "$GITHUB_BASE_REF"
          base="$(git merge-base HEAD "origin/$GITHUB_BASE_REF")"
          NX_BASE="$base" NX_HEAD=HEAD just check-affected

  full-check:
    name: full-check (${{ matrix.os }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install Tauri prerequisites
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap clean checkout
        run: just bootstrap
      - name: Full gate
        run: just check

  supply-chain:
    name: supply-chain
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install tools
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap clean checkout
        run: just bootstrap
      - name: Dependency policy and audit
        run: just supply-chain

  install:
    name: install (${{ matrix.os }})
    if: >-
      always() &&
      (github.event_name == 'pull_request' || needs.full-check.result == 'success')
    needs: full-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            bundles: deb,appimage
            platform: linux-x86_64
            assets: appimage,deb
          - os: ubuntu-22.04-arm
            bundles: deb,appimage
            platform: linux-aarch64
            assets: appimage,deb
          - os: macos-15
            bundles: dmg
            platform: macos-aarch64
            assets: dmg
          - os: windows-2025
            bundles: msi,nsis
            platform: windows-x86_64
            assets: msi,nsis
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install Tauri prerequisites
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          webkit2gtk-driver xvfb
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap clean checkout
        run: just bootstrap
      - name: Build native installer
        env:
          BUNDLE_FORMATS: ${{ matrix.bundles }}
        run: just bundle
      - name: Prepare release-like assets and checksums
        env:
          BUNDLE_DIRECTORY: target/release/bundle
          RELEASE_ASSET_DIRECTORY: target/release-assets
          RELEASE_ASSET_FORMATS: ${{ matrix.assets }}
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_TAG: v0.1.0
        run: just prepare-release-assets
      - name: Select, verify, and install the Linux release asset
        if: runner.os == 'Linux'
        env:
          RELEASE_PLATFORM: ${{ matrix.platform }}
        run: |
          if [[ "$RELEASE_PLATFORM" == "linux-aarch64" ]]; then
            install_root="$GITHUB_WORKSPACE/target/release"
          else
            install_root="$(mktemp -d)"
            trap 'rm -rf "$install_root"' EXIT
          fi
          ONEHARNESS_UI_RELEASE_BASE_URL="file://${GITHUB_WORKSPACE}/target/release-assets" \
            sh scripts/install.sh --version v0.1.0 --to "$install_root"
          test -x "$install_root/oneharness-ui"
      - name: Launch installed ARM64 AppImage without FUSE
        if: matrix.platform == 'linux-aarch64'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          ONEHARNESS_UI_E2E_PREBUILT: "1"
          ONEHARNESS_UI_E2E_STARTUP_ONLY: "1"
        run: xvfb-run -a just test-desktop-e2e
      - name: Mount and verify macOS artifact
        if: runner.os == 'macOS'
        run: |
          image="$(find . -name '*.dmg' -print -quit)"
          test -n "$image"
          mount="$(hdiutil attach "$image" -nobrowse | tail -1 | sed 's#^.*\(/Volumes/.*\)#\1#')"
          sudo ditto "$mount/oneharness.app" /Applications/oneharness.app
          hdiutil detach "$mount"
          test -x /Applications/oneharness.app/Contents/MacOS/oneharness
      - name: Install and verify Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = Get-ChildItem . -Filter *.msi -Recurse | Select-Object -First 1
          if (-not $msi) { throw "No MSI was built" }
          $process = Start-Process msiexec.exe -ArgumentList @('/i', $msi.FullName, '/qn', '/norestart') -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "MSI install failed: $($process.ExitCode)" }
          $installed = Get-ChildItem $env:ProgramFiles,$env:LOCALAPPDATA -Filter oneharness.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installed) { throw "Installed oneharness.exe was not found" }
