name: llmlint

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  copilot-requests: write
  contents: read

jobs:
  llmlint:
    name: llmlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch merge base
        run: git fetch --no-tags --depth=2147483647 origin main
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install and verify the Copilot judge harness
        run: |
          npm install --global @github/copilot@1.0.70
          copilot --version
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Install llmlint through the command surface
        run: |
          just setup-llmlint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate configuration without a model
        run: just lint-llm-validate --diff-base origin/main
      - name: Judge changed code
        env:
          COPILOT_GITHUB_TOKEN: ${{ github.token }}
          ONEHARNESS_HARNESSES: copilot
        # llmlint: ignore[live_tier_compiles_and_requires_credential, diagnostics_error_or_absent] Explicit Copilot quota exhaustion is the sole permitted non-blocking judge failure; all code findings and other harness errors remain blocking.
        run: just lint-llm-copilot
