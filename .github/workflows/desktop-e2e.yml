name: desktop-e2e

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: desktop-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # This is a deterministic, credential-free packaged journey: bootstrap builds
  # oneharness's local provider fixture and ONEHARNESS_NO_CONFIG prevents paid or
  # developer-configured providers from entering the test boundary.
  desktop-e2e:
    name: desktop-e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      ONEHARNESS_NO_CONFIG: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2025]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install Linux desktop and WebDriver prerequisites
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          pkg-config libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          webkit2gtk-driver xvfb
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap clean checkout
        run: just bootstrap
      - name: Deterministic packaged desktop journey (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a just test-desktop-e2e
      - name: Deterministic packaged desktop journey (Windows)
        if: runner.os == 'Windows'
        run: just test-desktop-e2e
      - name: Upload desktop failure evidence
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          if-no-files-found: ignore
          name: desktop-e2e-${{ matrix.os }}
          path: test-results/desktop-e2e

  macos-native-smoke:
    name: macos-native-smoke
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap clean checkout
        run: just bootstrap
      - name: Build native DMG
        env:
          BUNDLE_FORMATS: dmg
        run: just bundle
      - name: Mount, install, and verify native application
        run: |
          shopt -s nullglob
          images=(target/release/bundle/dmg/*.dmg)
          if (( ${#images[@]} != 1 )); then
            echo "Expected one DMG under target/release/bundle/dmg; inspect the bundle output and rerun the macOS smoke" >&2
            exit 1
          fi
          image="${images[0]}"
          mount="$(hdiutil attach "$image" -nobrowse | tail -1 | sed 's#^.*\(/Volumes/.*\)#\1#')"
          case "$mount" in
            /Volumes/*) ;;
            *) echo "DMG mount did not resolve under /Volumes; inspect hdiutil output and rerun the macOS smoke" >&2; exit 1 ;;
          esac
          trap 'hdiutil detach "$mount"' EXIT
          sudo ditto "$mount/oneharness.app" /Applications/oneharness.app
          hdiutil detach "$mount"
          trap - EXIT
          test -x /Applications/oneharness.app/Contents/MacOS/oneharness
          bridge=/Applications/oneharness.app/Contents/MacOS/oneharness-ui-bridge
          test -x "$bridge"
          response="$(printf '{"kind":"unknown"}\n' | "$bridge")"
          node -e 'const value=JSON.parse(process.argv[1]); if(value.ok!==false||value.error?.code!=="INVALID_REQUEST") process.exit(1)' "$response"
