name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: deb,appimage
          - os: macos-15
            bundles: app,dmg
          - os: windows-2025
            bundles: msi,nsis
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap clean checkout
        run: just bootstrap
      - name: Build native release through the command surface
        env:
          BUNDLE_FORMATS: ${{ matrix.bundles }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: just bundle
      - name: Create checksums
        env:
          BUNDLE_DIRECTORY: target/release/bundle
          CHECKSUM_OUTPUT: checksums-${{ runner.os }}.txt
        run: just checksums
      - name: Upload native release and checksums
        env:
          BUNDLE_DIRECTORY: target/release/bundle
          CHECKSUM_OUTPUT: checksums-${{ runner.os }}.txt
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: just upload-release
