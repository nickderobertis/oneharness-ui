name: release
run-name: release ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Verified semantic-release tag to build
        required: true
        type: string

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: release (${{ matrix.os }})
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            bundles: deb,appimage
            platform: linux-x86_64
            assets: appimage,deb
          - os: ubuntu-22.04-arm
            bundles: deb,appimage
            platform: linux-aarch64
            assets: appimage,deb
          - os: macos-15
            bundles: app,dmg
            platform: macos-aarch64
            assets: dmg
          - os: windows-2025
            bundles: msi,nsis
            platform: windows-x86_64
            assets: msi,nsis
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Validate and check out the release source
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: ./scripts/checkout-release.sh
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          webkit2gtk-driver xvfb
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap clean checkout
        run: just bootstrap
      - name: Materialize the verified release version
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: RELEASE_VERSION="${RELEASE_TAG#v}" just set-version
      - name: Build native release through the command surface
        env:
          BUNDLE_FORMATS: ${{ matrix.bundles }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: just bundle
      - name: Prepare canonical release assets and checksums
        env:
          BUNDLE_DIRECTORY: target/release/bundle
          RELEASE_ASSET_DIRECTORY: target/release-assets
          RELEASE_ASSET_FORMATS: ${{ matrix.assets }}
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: just prepare-release-assets
      - name: Install and launch the ARM64 release without FUSE
        if: matrix.platform == 'linux-aarch64'
        env:
          ONEHARNESS_UI_E2E_PREBUILT: "1"
          ONEHARNESS_UI_E2E_STARTUP_ONLY: "1"
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          ONEHARNESS_UI_RELEASE_BASE_URL="file://${GITHUB_WORKSPACE}/target/release-assets" \
            sh scripts/install.sh --version "$RELEASE_TAG" --to target/release
          APPIMAGE_EXTRACT_AND_RUN=1 xvfb-run -a just test-desktop-e2e
      - name: Upload ARM64 startup failure evidence
        if: failure() && matrix.platform == 'linux-aarch64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: ignore
          name: arm64-release-startup-${{ inputs.release_tag }}
          path: test-results/desktop-e2e
          retention-days: 7
      - name: Upload native release and checksums
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ASSET_DIRECTORY: target/release-assets
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: just upload-release

  verify-public-arm64:
    name: verify public ARM64 installer
    needs: release
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Validate and check out the release source
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: ./scripts/checkout-release.sh
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install native startup prerequisites
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          libwebkit2gtk-4.1-dev webkit2gtk-driver xvfb
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap release test harness
        run: just bootstrap
      - name: Install the public ARM64 release and launch without FUSE
        env:
          ONEHARNESS_UI_E2E_PREBUILT: "1"
          ONEHARNESS_UI_E2E_STARTUP_ONLY: "1"
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${RELEASE_TAG}/scripts/install.sh" \
            -o "$RUNNER_TEMP/oneharness-ui-install.sh"
          cmp "$RUNNER_TEMP/oneharness-ui-install.sh" scripts/install.sh || {
            echo "public installer differs from the verified release source; inspect the tag and retry" >&2
            exit 1
          }
          sh "$RUNNER_TEMP/oneharness-ui-install.sh" \
            --version "$RELEASE_TAG" --to target/release
          APPIMAGE_EXTRACT_AND_RUN=1 xvfb-run -a just test-desktop-e2e
      - name: Upload public ARM64 startup failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: ignore
          name: arm64-public-startup-${{ inputs.release_tag }}
          path: test-results/desktop-e2e
          retention-days: 7
