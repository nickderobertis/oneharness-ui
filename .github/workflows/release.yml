name: release
run-name: release ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Verified semantic-release tag to build
        required: true
        type: string

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: release (${{ matrix.os }})
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            bundles: deb,appimage
            platform: linux-x86_64
            assets: appimage,deb
          - os: ubuntu-24.04-arm
            bundles: deb,appimage
            platform: linux-aarch64
            assets: appimage,deb
          - os: macos-15
            bundles: app,dmg
            platform: macos-aarch64
            assets: dmg
          - os: windows-2025
            bundles: msi,nsis
            platform: windows-x86_64
            assets: msi,nsis
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Validate and check out the release source
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: ./scripts/checkout-release.sh
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: 0.11.28
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install just
        run: cargo install just --locked --version 1.42.4
      - name: Bootstrap clean checkout
        run: just bootstrap
      - name: Materialize the verified release version
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: RELEASE_VERSION="${RELEASE_TAG#v}" just set-version
      - name: Build native release through the command surface
        env:
          BUNDLE_FORMATS: ${{ matrix.bundles }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: just bundle
      - name: Prepare canonical release assets and checksums
        env:
          BUNDLE_DIRECTORY: target/release/bundle
          RELEASE_ASSET_DIRECTORY: target/release-assets
          RELEASE_ASSET_FORMATS: ${{ matrix.assets }}
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: just prepare-release-assets
      - name: Upload native release and checksums
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ASSET_DIRECTORY: target/release-assets
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: just upload-release
